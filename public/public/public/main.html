<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구트현X 고급 검색 명령어 생성기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f8fa; color: #14171a; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1da1f2; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .limit-text { font-weight: normal; color: #e0245e; font-size: 12px; margin-left: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccd6dd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input[type="text"]:focus, input[type="number"]:focus { border-color: #1da1f2; outline: none; }
        .help-text { font-size: 12px; color: #657786; margin-top: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; }
        .btn { width: 100%; background-color: #1da1f2; color: white; border: none; padding: 12px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:hover { background-color: #0c85d0; }
        .result-area { margin-top: 30px; }
        .result-box { background: #e6ecf0; padding: 15px; border-radius: 6px; margin-bottom: 10px; word-break: break-all; font-family: monospace; font-size: 13px; position: relative; }
        .copy-btn { background: #657786; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; float: right; margin-left: 10px;}
        .copy-btn:hover { background: #14171a; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 구트현X 검색기</h2>

    <div class="form-group">
        <label>1. 검색할 연도 범위 <span class="limit-text">(10년 단위로 자동 분할)</span></label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="startYear" placeholder="시작 연도 (예: 2015)">
            <span style="line-height: 40px;">~</span>
            <input type="number" id="endYear" placeholder="종료 연도 (예: 2024)">
        </div>
    </div>

    <div class="form-group">
        <label>2. 매년 반복할 날짜 구간</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="startMD">
            <span style="line-height: 40px;">~</span>
            <input type="date" id="endMD">
        </div>
        <div class="help-text">같은 연도 안에서 날짜를 고르면 됩니다. 검색에는 연도를 제외한 MM-DD만 사용합니다.</div>
    </div>

    <div class="form-group">
        <label>3. 특정 계정 (선택)</label>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px;">
            <button type="button" class="copy-btn" onclick="setDefaultAccounts(true)" style="float: none; margin-left: 0;">전체 선택</button>
            <button type="button" class="copy-btn" onclick="setDefaultAccounts(false)" style="float: none; margin-left: 0;">전체 해제</button>
        </div>
        <div id="defaultAccounts" style="display: grid; gap: 8px; margin-top: 8px;">
            <label class="checkbox-group" style="margin-top: 0;">
                <input type="checkbox" class="default-account" value="love_yuna">
                <span>love_yuna</span>
            </label>
            <label class="checkbox-group" style="margin-top: 0;">
                <input type="checkbox" class="default-account" value="JaurimOfficial">
                <span>JaurimOfficial</span>
            </label>
            <label class="checkbox-group" style="margin-top: 0;">
                <input type="checkbox" class="default-account" value="kim_jinman">
                <span>kim_jinman</span>
            </label>
            <label class="checkbox-group" style="margin-top: 0;">
                <input type="checkbox" class="default-account" value="2sunkyu">
                <span>2sunkyu</span>
            </label>
        </div>
        <div style="margin-top: 12px;">
            <input type="text" id="extraAccounts" placeholder="추가 계정 입력 (예: account1, account2)">
        </div>
        <div class="help-text">기본 계정은 체크로 선택/해제할 수 있고, 아래 칸에 다른 계정을 쉼표(,)로 추가할 수 있습니다.</div>
    </div>

    <div class="form-group">
        <label>4. 검색 단어 (선택)</label>
        <div class="checkbox-group" style="margin-top: 8px;">
            <input type="checkbox" id="useKeywords">
            <label for="useKeywords" style="margin:0; font-weight: normal;">검색 단어 적용</label>
        </div>
        <input type="text" id="keywords" value="자우림, jaurim, 이선규, 김진만, 김윤아" placeholder="예: 자우림, jaurim, 김윤아">
        <div class="help-text">쉼표(,)로 구분하여 여러 단어 입력 가능. 이 중 하나라도 포함되면 검색.</div>
    </div>

    <div class="form-group">
        <label>5. 필터링 (파딱 & 리트윗)</label>
        <input type="number" id="minRt" placeholder="최소 리트윗 수 (예: 10)">
        <div class="checkbox-group">
            <input type="checkbox" id="verifiedOr">
            <label for="verifiedOr" style="margin:0;">파란 딱지(공식 계정)이거나 위 리트윗 수를 넘긴 글만 보기</label>
        </div>
    </div>

    <button class="btn" onclick="generateQuery()">명령어 만들기</button>

    <div id="resultContainer" class="result-area"></div>
</div>

<script>
    function setDefaultAccounts(checked) {
        document.querySelectorAll('.default-account').forEach(input => {
            input.checked = checked;
        });
    }

    function isLeapYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
    }

    function isValidMonthDaySyntax(value) {
        return /^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$/.test(value);
    }

    function toMonthDay(dateValue) {
        const [year, month, day] = dateValue.split('-');
        return `${month}-${day}`;
    }

    function getLocalDateOffset(days) {
        const date = new Date();
        date.setDate(date.getDate() + days);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getCurrentYear() {
        return new Date().getFullYear();
    }

    function initializeYearInputs() {
        const startInput = document.getElementById('startYear');
        const endInput = document.getElementById('endYear');

        if (startInput && !startInput.value) {
            startInput.value = "2006";
        }

        if (endInput && !endInput.value) {
            endInput.value = String(getCurrentYear());
        }
    }

    function initializeDatePickers() {
        const startInput = document.getElementById('startMD');
        const endInput = document.getElementById('endMD');

        if (startInput && !startInput.value) {
            startInput.value = getLocalDateOffset(0);
        }

        if (endInput && !endInput.value) {
            endInput.value = getLocalDateOffset(1);
        }
    }

    function initializeKeywordToggle() {
        const toggle = document.getElementById('useKeywords');
        const input = document.getElementById('keywords');

        if (!toggle || !input) return;

        const sync = () => {
            input.disabled = !toggle.checked;
        };

        toggle.addEventListener('change', sync);
        sync();
    }

    function isValidMonthDayForYear(value, year) {
        if (!isValidMonthDaySyntax(value)) return false;

        const [month, day] = value.split('-').map(Number);
        const maxDays = [31, isLeapYear(year) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        return day <= maxDays[month - 1];
    }

    function isNonNegativeIntegerText(value) {
        return /^[0-9]+$/.test(value);
    }

    function splitYearRanges(startYear, endYear, maxSpanYears) {
        const ranges = [];
        for (let currentStart = startYear; currentStart <= endYear; currentStart += maxSpanYears) {
            ranges.push({
                start: currentStart,
                end: Math.min(currentStart + maxSpanYears - 1, endYear),
            });
        }
        return ranges;
    }

    function generateQuery() {
        // 입력값 가져오기
        const startYear = parseInt(document.getElementById('startYear').value);
        const endYear = parseInt(document.getElementById('endYear').value);
        const startDateValue = document.getElementById('startMD').value.trim();
        const endDateValue = document.getElementById('endMD').value.trim();
        const defaultAccountInputs = Array.from(document.querySelectorAll('.default-account'));
        const extraAccountsRaw = document.getElementById('extraAccounts').value;
        const useKeywords = document.getElementById('useKeywords').checked;
        const keywordsRaw = document.getElementById('keywords').value;
        const minRt = document.getElementById('minRt').value;
        const verifiedOr = document.getElementById('verifiedOr').checked;

        if (!Number.isInteger(startYear) || !Number.isInteger(endYear)) {
            alert("시작 연도와 종료 연도를 숫자로 정확히 입력해주세요!");
            return;
        }

        if (startYear > endYear) {
            alert("시작 연도는 종료 연도보다 클 수 없습니다!");
            return;
        }

        if (!startDateValue || !endDateValue) {
            alert("시작일과 종료일을 정확히 입력해주세요!");
            return;
        }

        if (!/^\d{4}-\d{2}-\d{2}$/.test(startDateValue) || !/^\d{4}-\d{2}-\d{2}$/.test(endDateValue)) {
            alert("날짜를 달력에서 선택해주세요!");
            return;
        }

        const startDate = new Date(`${startDateValue}T00:00:00`);
        const endDate = new Date(`${endDateValue}T00:00:00`);
        if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) {
            alert("날짜를 다시 확인해주세요!");
            return;
        }

        if (startDate.getFullYear() !== endDate.getFullYear()) {
            alert("시작일과 종료일은 같은 연도여야 합니다!\n예: 2024-06-19 ~ 2024-06-20");
            return;
        }

        if (startDateValue > endDateValue) {
            alert("시작일은 종료일보다 앞서야 합니다!\n예: 2024-06-19 ~ 2024-06-20");
            return;
        }

        const startMD = toMonthDay(startDateValue);
        const endMD = toMonthDay(endDateValue);

        // 계정 처리
        let accounts = defaultAccountInputs
            .filter(input => input.checked)
            .map(input => input.value.trim())
            .filter(s => s !== '');

        const extraAccounts = extraAccountsRaw.split(',').map(s => s.trim()).filter(s => s !== '');
        accounts = [...new Set(accounts.concat(extraAccounts))];

        let accountQuery = '';
        if (accounts.length > 0) {
            if (accounts.length === 1) {
                accountQuery = `from:${accounts[0]}`;
            } else {
                accountQuery = `(${accounts.map(a => `from:${a}`).join(' OR ')})`;
            }
        }

        // 단어 처리
        let keywords = useKeywords ? keywordsRaw.split(',').map(s => s.trim()).filter(s => s !== '') : [];
        let keywordQuery = '';
        if (keywords.length > 0) {
            if (keywords.length === 1) {
                keywordQuery = `${keywords[0]}`;
            } else {
                keywordQuery = `(${keywords.join(' OR ')})`;
            }
        }

        // 필터 처리 (파딱 OR RT)
        let filterQuery = '';
        if (verifiedOr && minRt) {
            if (!isNonNegativeIntegerText(minRt)) {
                alert("최소 리트윗 수는 0 이상의 정수여야 합니다!");
                return;
            }
            filterQuery = `(filter:verified OR min_retweets:${minRt})`;
        } else if (verifiedOr) {
            filterQuery = `filter:verified`;
        } else if (minRt) {
            if (!isNonNegativeIntegerText(minRt)) {
                alert("최소 리트윗 수는 0 이상의 정수여야 합니다!");
                return;
            }
            filterQuery = `min_retweets:${minRt}`;
        }

        if (accounts.length === 0 && keywords.length === 0 && !filterQuery) {
            alert("검색 조건이 너무 비어 있습니다. 계정, 검색어, 필터 중 하나 이상을 설정해주세요!");
            return;
        }

        const invalidYear = Array.from({ length: endYear - startYear + 1 }, (_, index) => startYear + index)
            .find(year => !isValidMonthDayForYear(startMD, year) || !isValidMonthDayForYear(endMD, year));

        if (invalidYear !== undefined) {
            alert(`입력한 날짜가 ${invalidYear}년 기준으로 유효하지 않습니다.\n윤년 날짜(예: 02-29)는 모든 선택 연도에서 존재할 때만 사용할 수 있습니다.`);
            return;
        }

        // 기본 명령어 조합
        let baseParts = [];
        if (accountQuery) baseParts.push(accountQuery);
        if (keywordQuery) baseParts.push(keywordQuery);
        if (filterQuery) baseParts.push(filterQuery);
        let baseQuery = baseParts.join(' ');

        const yearRanges = splitYearRanges(startYear, endYear, 10);
        const resultContainer = document.getElementById('resultContainer');
        resultContainer.innerHTML = '<h3>✨ 생성된 검색 명령어</h3>';

        const summary = document.createElement('div');
        summary.className = 'help-text';
        summary.style.marginBottom = '12px';
        summary.innerText = `총 ${yearRanges.length}개 검색어가 생성되었습니다.`;
        resultContainer.appendChild(summary);

        yearRanges.forEach((range, index) => {
            const dateQueries = [];
            for (let y = range.start; y <= range.end; y++) {
                dateQueries.push(`(since:${y}-${startMD} until:${y}-${endMD})`);
            }

            const dateString = `(${dateQueries.join(' OR ')})`;
            const finalQuery = baseQuery ? `${baseQuery} ${dateString}` : dateString;

            const box = document.createElement('div');
            box.className = 'result-box clearfix';

            const title = document.createElement('strong');
            title.innerText = `${index + 1}. ${range.start}년 ~ ${range.end}년 검색어`;
            title.style.display = 'block';
            title.style.marginBottom = '8px';
            title.style.color = '#1da1f2';

            const code = document.createElement('div');
            code.innerText = finalQuery;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerText = '복사하기';
            copyBtn.onclick = function() {
                navigator.clipboard.writeText(finalQuery).then(() => {
                    copyBtn.innerText = '복사 완료!';
                    copyBtn.style.background = '#1da1f2';
                    setTimeout(() => {
                        copyBtn.innerText = '복사하기';
                        copyBtn.style.background = '#657786';
                    }, 2000);
                });
            };

            box.appendChild(title);
            box.appendChild(copyBtn);
            box.appendChild(code);
            resultContainer.appendChild(box);
        });

    }

    initializeYearInputs();
    initializeDatePickers();
    initializeKeywordToggle();
</script>

</body>
</html>
